<!DOCTYPE html>
<html>
<head>
  <title>GoHome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align: center;">

  <h1>🏠 GoHome</h1>

  <button onclick="loadTrips()" style="font-size:20px; padding:10px;">
    Rentrer chez moi
  </button>

  <div id="result" style="margin-top:20px;"></div>

  <script>
    async function loadTrips() {
      const result = document.getElementById("result");
      result.innerHTML = "Chargement...";

      try {
        const response = await fetch("https://api.transport.rest/stations/stop-area:OCE:SA:8768600/departures");
        const data = await response.json();

        let html = "<h2>Prochains départs :</h2>";

        data.departures.slice(0,5).forEach(dep => {
          html += `
            <p>
              🚆 ${dep.line.name} → ${dep.direction}<br>
              ⏱ ${new Date(dep.when).toLocaleTimeString()}
            </p>
          `;
        });

        result.innerHTML = html;

      } catch (e) {
        result.innerHTML = "Erreur 😢";
      }
    }
  </script>

</body>
</html>
