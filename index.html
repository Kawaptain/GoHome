<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GoHome1</title>
</head>

<body>

  <h1>GoHome</h1>
  <button onclick="loadTrips()">Rentrer chez moi</button>

  <div id="result"></div>

  <script>
    async function loadTrips() {
      const result = document.getElementById("result");
      result.innerHTML = "Chargement...";

      try {
        const url = "https://v6.db.transport.rest/stops/8768600/departures";

        const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(url));

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        let html = "<h2>Prochains départs :</h2>";

        data.departures.slice(0,5).forEach(dep => {
          html += `
            <p>
              🚆 ${dep.line.name} → ${dep.direction}<br>
              ⏱ ${new Date(dep.when).toLocaleTimeString()}
            </p>
          `;
        });

        result.innerHTML = html;

      } catch (e) {
        result.innerHTML = "Erreur API 😢<br>" + e;
        console.error(e);
      }
    }
  </script>

</body>
</html>
